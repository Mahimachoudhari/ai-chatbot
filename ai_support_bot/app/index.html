<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chatbot Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f19;
    color: white;
}

/* HEADER */
.header {
    padding: 15px;
    text-align: center;
    background: #111827;
    font-size: 18px;
    font-weight: bold;
}

/* CHAT BOX */
.chat-box {
    height: 75vh;
    overflow-y: auto;
    padding: 15px;
}

/* MESSAGE */
.msg {
    padding: 12px;
    margin: 10px;
    border-radius: 12px;
    max-width: 70%;
    white-space: pre-wrap;
}

.user {
    background: #2563eb;
    margin-left: auto;
}

.bot {
    background: #1f2937;
}

/* INPUT AREA */
.input-area {
    display: flex;
    padding: 10px;
    background: #111827;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #0f172a;
    color: white;
}

button {
    padding: 10px 15px;
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* CLEAR BUTTON */
.clear-btn {
    background: red;
}
</style>
</head>

<body>

<div class="header">
🤖 AI Chatbot Pro
<button class="clear-btn" onclick="clearChat()">Clear Chat</button>
</div>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
    <input type="file" id="fileInput">
    <input type="text" id="input" placeholder="Ask something...">
    <button onclick="sendMsg()">Send</button>
</div>

<script>

const chatBox = document.getElementById("chatBox");

/* ================= LOAD HISTORY ================= */
window.onload = function(){
    let saved = localStorage.getItem("chat_history");
    if(saved){
        chatBox.innerHTML = saved;
    }
}

/* ================= SAVE ================= */
function saveChat(){
    localStorage.setItem("chat_history", chatBox.innerHTML);
}

/* ================= ADD MESSAGE ================= */
function addMsg(text, type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    saveChat();
}

/* ================= SEND MESSAGE ================= */
async function sendMsg(){

    let input = document.getElementById("input");
    let text = input.value;

    if(!text) return;

    addMsg(text, "user");
    input.value = "";

    try {
        const res = await fetch(`http://127.0.0.1:8000/ask?query=${encodeURIComponent(text)}`);
        const data = await res.json();

        addMsg(data.answer, "bot");

    } catch (err) {
        addMsg("❌ Server not connected", "bot");
    }
}

/* ================= UPLOAD FILE ================= */
document.getElementById("fileInput").addEventListener("change", async function(){

    let file = this.files[0];
    let formData = new FormData();
    formData.append("file", file);

    try {
        await fetch("http://127.0.0.1:8000/upload", {
            method: "POST",
            body: formData
        });

        addMsg("📄 PDF uploaded successfully!", "bot");

    } catch (err) {
        addMsg("Upload failed ❌", "bot");
    }
});

/* ================= CLEAR CHAT ================= */
function clearChat(){
    chatBox.innerHTML = "";
    localStorage.removeItem("chat_history");
}

</script>

</body>
</html>
